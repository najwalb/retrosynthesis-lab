# OpenShift/Rahti deployment configuration for RDKit Flask app
# Apply with: oc apply -f openshift-deployment.yaml

---
# ImageStream - stores the built container image
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: rdkit-retro
  labels:
    app: rdkit-retro
spec:
  lookupPolicy:
    local: true

---
# BuildConfig - defines how to build the image from Dockerfile
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: rdkit-retro
  labels:
    app: rdkit-retro
spec:
  source:
    type: Git
    git:
      uri: https://github.com/NajwaLaabid/RxnLab.git
      ref: main
  strategy:
    type: Docker
    dockerStrategy:
      # Use the Dockerfile in the repo root
      dockerfilePath: Dockerfile
  output:
    to:
      kind: ImageStreamTag
      name: rdkit-retro:latest
  resources:
    limits:
      cpu: "1"
      memory: 2Gi
    requests:
      cpu: 200m
      memory: 512Mi
  # Uncomment to trigger builds on git push (requires webhook setup)
  # triggers:
  #   - type: GitHub
  #     github:
  #       secret: your-webhook-secret

---
# Deployment - runs the application pods
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rdkit-retro
  labels:
    app: rdkit-retro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rdkit-retro
  template:
    metadata:
      labels:
        app: rdkit-retro
    spec:
      containers:
        - name: rdkit-retro
          image: image-registry.openshift-image-registry.svc:5000/diffalign/rdkit-retro:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            # Pukki Postgres connection: create the secret first with
            #   oc create secret generic rxnlab-db --from-literal=DATABASE_URL='postgresql+psycopg2://USER:PASS@HOST:5432/rxnlab'
            # The container starts even if the secret is missing (optional: true) but DB
            # features stay disabled — predictions still serve, no feedback is persisted.
            - secretRef:
                name: rxnlab-db
                optional: true
          volumeMounts:
            - name: checkpoints
              mountPath: /app/DiffAlign/checkpoints
              readOnly: true
          resources:
            limits:
              cpu: "1"
              memory: 4Gi
            requests:
              cpu: 500m
              memory: 3Gi
          # Health checks
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 5
      volumes:
        - name: checkpoints
          persistentVolumeClaim:
            claimName: diffalign-align-absorbing

---
# Service - internal load balancer for the pods
apiVersion: v1
kind: Service
metadata:
  name: rdkit-retro
  labels:
    app: rdkit-retro
spec:
  ports:
    - name: 8080-tcp
      port: 8080
      protocol: TCP
      targetPort: 8080
  selector:
    app: rdkit-retro
  type: ClusterIP

---
# Route - exposes the service to the internet via custom domain
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: rdkit-retro
  labels:
    app: rdkit-retro
  annotations:
    haproxy.router.openshift.io/timeout: 600s
spec:
  port:
    targetPort: 8080-tcp
  to:
    kind: Service
    name: rdkit-retro
    weight: 100
  # Custom domain config - requires CSC permission for custom hosts
  # host: rxnlab.org
  # tls:
  #   termination: edge
  #   insecureEdgeTerminationPolicy: Redirect
  #   certificate: <Cloudflare Origin Certificate>
  #   key: <Cloudflare Private Key>
